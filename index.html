<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicago Gang Map - Beyond Trench</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <style>
        /* Podstawowy reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Segoe UI', -apple-system, sans-serif; 
            background-color: #0d0e12; 
            display: flex; /* Ustawienie sidebaru i mapy obok siebie */
        }

        /* Szklany Sidebar (Lista Gangów) */
        #sidebar {
            width: 320px;
            height: 100%;
            background: rgba(20, 24, 33, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.6);
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.2);
        }

        .sidebar-header h1 { 
            font-size: 20px; color: #5aa1e2; text-transform: uppercase; 
            margin-bottom: 5px; letter-spacing: 1px;
        }
        
        .sidebar-header p { font-size: 12px; color: #8fa0b5; text-transform: uppercase; letter-spacing: 1px;}

        .gang-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* Suwak w liście */
        .gang-list::-webkit-scrollbar { width: 6px; }
        .gang-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .gang-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .gang-item {
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            cursor: pointer;
