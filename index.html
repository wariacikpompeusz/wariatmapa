<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicago Map - Przeglądarka</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #0d0e12;
        }

        #map {
            width: 100%;
            height: 100%;
            background-color: #14161d;
            z-index: 1;
        }

        /* Nowoczesny, szklany panel informacyjny */
        .glass-ui {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 1000;
            background: rgba(20, 24, 33, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 18px 28px;
            color: #ffffff;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            pointer-events: auto;
        }

        .glass-ui h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #5aa1e2;
            margin-bottom: 4px;
            text-shadow: 0 2px 10px rgba(90, 161, 226, 0.3);
        }

        .glass-ui p {
            font-size: 11px;
            color: #8fa0b5;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Stylizacja kontrolek przybliżania Leaflet, aby pasowały do ciemnego motywu */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4) !important;
        }

        .leaflet-control-zoom-in, .leaflet-control-zoom-out {
            background: rgba(20, 24, 33, 0.85) !important;
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(8px);
            font-size: 16px !important;
        }

        .leaflet-control-zoom-in:hover, .leaflet-control-zoom-out:hover {
            background: rgba(40, 48, 66, 0.95) !important;
            color: #5aa1e2 !important;
        }

        .leaflet-bar {
            border-radius: 10px !important;
            overflow: hidden;
        }
        
        .leaflet-container .leaflet-control-attribution {
            background: rgba(13, 14, 18, 0.7);
            color: #556375;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div class="glass-ui">
        <h1>Chicago Map</h1>
        <p>Beyond Trench Edition</p>
    </div>

    <div id="map"></div>

    <script>
        // Konfiguracja mapy na podstawie Twoich kafelków
        var map = L.map('map', {
            minZoom: 2,
            maxZoom: 4,
            zoomControl: true,
            attributionControl: true
        }).setView([0, 0], 2);

        // Link bezpośrednio pobierający kafelki z Twojego GitHub Pages
        var tileUrl = 'https://wariacikpompeusz.github.io/wariatmapa/{z}/{x}/{y}.png';

        L.tileLayer(tileUrl, {
            maxZoom: 4,
            minZoom: 2,
            noWrap: true,
            continuousWorld: true,
            attribution: 'Beyond Trench OS'
        }).addTo(map);
    </script>

</body>
</html>
